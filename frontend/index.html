<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8x8 - Weekly Gladiator Chess Tournaments</title>
    <meta name="description" content="8x8 is a weekly online blitz chess tournament held every Sunday. Enter with 3 lives, fight to keep them, and see if you can win the arena." />
    <meta property="og:title" content="8x8 - Weekly Gladiator Chess Tournaments" />
    <meta property="og:description" content="8x8 is a weekly online blitz chess tournament held every Sunday. Enter with 3 lives, fight to keep them, and see if you can win the arena." />
    <style>
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #1a1a1a;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: auto;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-container {
        min-height: 100vh;
        background-color: #fffafb;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
